<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js" ></script>
    <title>EasyNotes</title>
</head>
<body>
    <div class="pageContent">
        <header>
            <div class="left-header">
                EasyNotes
            </div>
            <div class="right-header">
                <button onclick="openNewNoteDialog()" class="newNote" title="Add Notes">
                    +
                    <!-- <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg> -->
                </button>
                <button onclick="toggleTheme()" id="themeToggleBtn" class="theme-toggle-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z"/></svg>
                </button>
            </div>
        </header>

        <main>
            <div class="notesContainer">
                
            </div>
        </main>

    </div>
    

    <dialog class="dialogBox">

        <video class="dialogBGVideo" autoplay muted loop>
            <source src="abstract.mp4" type="video/mp4" >
        </video>

            <div class="dialogContent">
                <div class="dialogHeader">
                    <h2 class="dialogTitle">
                        Add Note
                    </h2>
                    <button class="dialogCloseButton" onclick="closeNewNoteDialog()">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
                    </button>
                </div>
                <form class="noteForm">
                    <div class="dialogMain">
                        <div class="dialogMainInputs">
                           
                            <label class="newNoteTitleLabel">
                                Enter the title of the note ...
                            </label>
                                <input class="newNotesTitle" placeholder="Hello" required>
                            <label class="newNoteContentLabel">
                                Enter your notes below
                            </label>
                                <textarea class="newNotesContent" placeholder="Enter your notes here" required></textarea>
                        
                        </div>
                        <div class="dialogMainButtons">
                            <button type="button" class="cancelNewNotesButton" onclick=closeNewNoteDialog() >Cancel</button>
                            <button type="submit" class="submitNewNotesButton">Submit</button>
                        </div>

                    </div>
                </form>
            </div>
        </dialog>
</body>
<footer>
    Bhargavan PV
</footer>
</html>
